openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Smart Learning System - Student Analytics API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: dashboard
  - name: comparison
  - name: grades
  - name: assignments
  - name: submissions
  - name: courses
  - name: attendance
  - name: alerts
  - name: heatmap
  - name: habits
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }
  /dashboard/{studentId}:
    get:
      operationId: getDashboard
      tags: [dashboard]
      parameters:
        - in: path
          name: studentId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }
  /students/{studentId}/courses:
    get:
      operationId: getStudentCourses
      tags: [courses]
      parameters:
        - in: path
          name: studentId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Student's courses
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Course" }
  /comparison/{studentId}:
    get:
      operationId: getComparison
      tags: [comparison]
      parameters:
        - in: path
          name: studentId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Per-course comparison data
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ComparisonReport" }
  /grades/{studentId}/averages:
    get:
      operationId: getAverages
      tags: [grades]
      parameters:
        - in: path
          name: studentId
          required: true
          schema: { type: integer }
        - in: query
          name: semester
          required: false
          schema: { type: string }
          description: Filter averages to a single semester. Defaults to all semesters.
      responses:
        "200":
          description: Averages
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AveragesReport" }
  /grades/{studentId}/breakdown/{courseId}:
    get:
      operationId: getGradeBreakdown
      tags: [grades]
      parameters:
        - in: path
          name: studentId
          required: true
          schema: { type: integer }
        - in: path
          name: courseId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Breakdown
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GradeBreakdown" }
  /attendance/{studentId}:
    get:
      operationId: getAttendance
      tags: [attendance]
      parameters:
        - in: path
          name: studentId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Attendance summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AttendanceReport" }
  /assignments/{studentId}/weekly:
    get:
      operationId: getWeeklyAssignments
      tags: [assignments]
      parameters:
        - in: path
          name: studentId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Weekly assignments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WeeklyAssignment" }
  /assignments/{assignmentId}/complete:
    put:
      operationId: completeAssignment
      tags: [assignments]
      parameters:
        - in: path
          name: assignmentId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssignmentCompleteInput" }
      responses:
        "200":
          description: Completed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WeeklyAssignment" }
  /submissions/{studentId}/rate:
    get:
      operationId: getSubmissionRate
      tags: [submissions]
      parameters:
        - in: path
          name: studentId
          required: true
          schema: { type: integer }
        - in: query
          name: courseId
          required: false
          description: Filter the submission rate to a single course. Defaults to all courses.
          schema: { type: integer }
      responses:
        "200":
          description: Submission rate report
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SubmissionRateReport" }
  /submissions/{studentId}/missed:
    get:
      operationId: getMissedAssignments
      tags: [submissions]
      parameters:
        - in: path
          name: studentId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Missed assignments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MissedAssignment" }
  /alerts/{studentId}:
    get:
      operationId: getAlerts
      tags: [alerts]
      summary: List risk alerts (generates fresh alerts, then returns filtered/sorted/paginated results)
      parameters:
        - in: path
          name: studentId
          required: true
          schema: { type: integer }
        - in: query
          name: status
          required: false
          description: Filter by alert status. Defaults to all statuses.
          schema: { type: string, enum: [active, resolved, dismissed] }
        - in: query
          name: alertType
          required: false
          description: Filter by alert type.
          schema: { type: string }
        - in: query
          name: severity
          required: false
          description: Filter by severity.
          schema: { type: string, enum: [low, medium, high] }
        - in: query
          name: courseId
          required: false
          description: Filter to a single course.
          schema: { type: integer }
        - in: query
          name: sortBy
          required: false
          description: Sort field. Defaults to date.
          schema: { type: string, enum: [date, severity] }
        - in: query
          name: sortDir
          required: false
          description: Sort direction. Defaults to desc.
          schema: { type: string, enum: [asc, desc] }
        - in: query
          name: page
          required: false
          description: 1-based page number. Defaults to 1.
          schema: { type: integer, minimum: 1 }
        - in: query
          name: pageSize
          required: false
          description: Items per page. Defaults to 10.
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: Risk alerts report
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlertsReport" }
  /alerts/{studentId}/{alertId}:
    patch:
      operationId: updateAlertStatus
      tags: [alerts]
      summary: Update an alert's status (mark resolved or dismissed)
      parameters:
        - in: path
          name: studentId
          required: true
          schema: { type: integer }
        - in: path
          name: alertId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AlertStatusInput" }
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RiskAlert" }
  /heatmap/{studentId}:
    get:
      operationId: getHeatmap
      tags: [heatmap]
      summary: Heatmap analytics — attendance and grade performance per course over time, with strong/weak identification, class comparison and recommendations
      parameters:
        - in: path
          name: studentId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Heatmap analytics report
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HeatmapReport" }
  /habits/{studentId}:
    get:
      operationId: getHabits
      tags: [habits]
      summary: Learning habit tracking — daily study summary, weekly consistency, average session duration, productive hours, submission habits, trends and inconsistency alerts
      parameters:
        - in: path
          name: studentId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Learning habit tracking report
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HabitsReport" }
  /habits/{studentId}/alerts/{alertId}:
    patch:
      operationId: updateHabitAlertStatus
      tags: [habits]
      summary: Update the status of a learning-habit alert (e.g. dismiss)
      parameters:
        - in: path
          name: studentId
          required: true
          schema: { type: integer }
        - in: path
          name: alertId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HabitAlertStatusInput" }
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HabitAlert" }
  /submissions/{studentId}/goal:
    put:
      operationId: updateSubmissionGoal
      tags: [submissions]
      parameters:
        - in: path
          name: studentId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubmissionGoalInput" }
      responses:
        "200":
          description: Updated goal
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SubmissionGoal" }
components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }
    Course:
      type: object
      required: [id, courseName, courseCode, semester]
      properties:
        id: { type: integer }
        courseName: { type: string }
        courseCode: { type: string }
        semester: { type: string }
    DashboardSummary:
      type: object
      required:
        - studentName
        - overallAverage
        - bestCourse
        - weakestCourse
        - submissionRate
        - dueThisWeek
        - overdueCount
        - classComparisonSummary
        - attendanceRate
        - alerts
      properties:
        studentName: { type: string }
        overallAverage: { type: ["number", "null"] }
        bestCourse: { type: ["string", "null"] }
        weakestCourse: { type: ["string", "null"] }
        submissionRate: { type: number }
        dueThisWeek: { type: integer }
        overdueCount: { type: integer }
        classComparisonSummary: { type: string }
        attendanceRate: { type: number }
        alerts:
          type: array
          items: { type: string }
    ComparisonItem:
      type: object
      required:
        - courseId
        - courseName
        - studentAverage
        - classAverage
        - difference
        - status
        - trend
      properties:
        courseId: { type: integer }
        courseName: { type: string }
        studentAverage: { type: ["number", "null"] }
        classAverage: { type: number }
        difference: { type: ["number", "null"] }
        status: { type: string }
        trend:
          type: array
          items: { $ref: "#/components/schemas/ComparisonTrendPoint" }
    ComparisonTrendPoint:
      type: object
      required: [date, studentAverage, classAverage]
      properties:
        date: { type: string }
        studentAverage: { type: number }
        classAverage: { type: number }
    ComparisonReport:
      type: object
      required: [items, trend]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ComparisonItem" }
        trend:
          type: array
          items: { $ref: "#/components/schemas/ComparisonTrendPoint" }
    CourseAverage:
      type: object
      required: [courseId, courseName, average, gradeCount, finalGrade, letterGrade]
      properties:
        courseId: { type: integer }
        courseName: { type: string }
        average: { type: ["number", "null"] }
        gradeCount: { type: integer }
        finalGrade: { type: ["number", "null"] }
        letterGrade: { type: ["string", "null"] }
    TrendPoint:
      type: object
      required: [date, average]
      properties:
        date: { type: string }
        average: { type: number }
    AveragesReport:
      type: object
      required: [overall, perCourse, trend, semesters]
      properties:
        overall: { type: ["number", "null"] }
        perCourse:
          type: array
          items: { $ref: "#/components/schemas/CourseAverage" }
        trend:
          type: array
          items: { $ref: "#/components/schemas/TrendPoint" }
        semesters:
          type: array
          items: { type: string }
    Grade:
      type: object
      required:
        - id
        - studentId
        - courseId
        - grade
        - weight
        - gradeType
        - gradeDate
      properties:
        id: { type: integer }
        studentId: { type: integer }
        courseId: { type: integer }
        grade: { type: number }
        weight: { type: number }
        gradeType: { type: string }
        gradeDate: { type: string }
    GradeBreakdown:
      type: object
      required: [courseId, courseName, grades, weightedAverage]
      properties:
        courseId: { type: integer }
        courseName: { type: string }
        weightedAverage: { type: ["number", "null"] }
        grades:
          type: array
          items: { $ref: "#/components/schemas/Grade" }
    AttendanceCourse:
      type: object
      required:
        - courseId
        - courseName
        - totalSessions
        - attended
        - absent
        - late
        - excused
        - rate
      properties:
        courseId: { type: integer }
        courseName: { type: string }
        totalSessions: { type: integer }
        attended: { type: integer }
        absent: { type: integer }
        late: { type: integer }
        excused: { type: integer }
        rate: { type: number }
    AttendanceReport:
      type: object
      required:
        - overall
        - totalSessions
        - attended
        - status
        - perCourse
        - alerts
      properties:
        overall: { type: number }
        totalSessions: { type: integer }
        attended: { type: integer }
        status: { type: string }
        perCourse:
          type: array
          items: { $ref: "#/components/schemas/AttendanceCourse" }
        alerts:
          type: array
          items: { type: string }
    WeeklyAssignment:
      type: object
      required:
        - id
        - title
        - description
        - courseId
        - courseName
        - dueDate
        - status
        - urgency
        - isOverdue
        - hoursUntilDue
        - completedAt
        - daysLate
        - isDueWithin24Hours
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string }
        courseId: { type: integer }
        courseName: { type: string }
        dueDate: { type: string }
        status: { type: string }
        urgency: { type: string }
        isOverdue: { type: boolean }
        hoursUntilDue: { type: number }
        completedAt: { type: ["string", "null"] }
        daysLate: { type: integer }
        isDueWithin24Hours: { type: boolean }
    AssignmentCompleteInput:
      type: object
      required: [studentId]
      properties:
        studentId: { type: integer }
    CourseSubmissionRate:
      type: object
      required:
        - courseId
        - courseName
        - total
        - submitted
        - late
        - missed
        - rate
        - classAverage
      properties:
        courseId: { type: integer }
        courseName: { type: string }
        total: { type: integer }
        submitted: { type: integer }
        late: { type: integer }
        missed: { type: integer }
        rate: { type: number }
        classAverage: { type: number }
    SubmissionRatePoint:
      type: object
      required: [date, rate]
      properties:
        date: { type: string }
        rate: { type: number }
    SubmissionRateReport:
      type: object
      required:
        - overall
        - total
        - submitted
        - late
        - missed
        - target
        - classAverage
        - label
        - perCourse
        - trend
        - alerts
      properties:
        overall: { type: number }
        total: { type: integer }
        submitted: { type: integer }
        late: { type: integer }
        missed: { type: integer }
        target: { type: number }
        classAverage: { type: number }
        label: { type: string }
        perCourse:
          type: array
          items: { $ref: "#/components/schemas/CourseSubmissionRate" }
        trend:
          type: array
          items: { $ref: "#/components/schemas/SubmissionRatePoint" }
        alerts:
          type: array
          items: { type: string }
    MissedAssignment:
      type: object
      required: [id, title, courseName, dueDate, status]
      properties:
        id: { type: integer }
        title: { type: string }
        courseName: { type: string }
        dueDate: { type: string }
        status: { type: string }
    SubmissionGoal:
      type: object
      required: [studentId, targetRate]
      properties:
        studentId: { type: integer }
        targetRate: { type: number }
    SubmissionGoalInput:
      type: object
      required: [targetRate]
      properties:
        targetRate: { type: number, minimum: 0, maximum: 100 }
    RiskAlert:
      type: object
      required:
        - id
        - studentId
        - alertType
        - courseId
        - courseName
        - title
        - message
        - severity
        - status
        - recommendation
        - userStory
        - riskScore
        - createdAt
      properties:
        id: { type: integer }
        studentId: { type: integer }
        alertType: { type: string }
        courseId: { type: ["integer", "null"] }
        courseName: { type: ["string", "null"] }
        title: { type: string }
        message: { type: string }
        severity: { type: string }
        status: { type: string }
        recommendation: { type: string }
        userStory: { type: string }
        riskScore: { type: ["number", "null"] }
        createdAt: { type: string }
    AlertSummary:
      type: object
      required: [active, high, medium, low, resolved, dismissed]
      properties:
        active: { type: integer }
        high: { type: integer }
        medium: { type: integer }
        low: { type: integer }
        resolved: { type: integer }
        dismissed: { type: integer }
    AlertsReport:
      type: object
      required: [summary, alerts, total, page, pageSize, totalPages]
      properties:
        summary: { $ref: "#/components/schemas/AlertSummary" }
        alerts:
          type: array
          items: { $ref: "#/components/schemas/RiskAlert" }
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }
        totalPages: { type: integer }
    AlertStatusInput:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [active, resolved, dismissed] }
    HeatmapPeriod:
      type: object
      required: [key, label]
      properties:
        key: { type: string, description: "Period key, e.g. 2026-01" }
        label: { type: string, description: "Short display label, e.g. Jan" }
    HeatmapCell:
      type: object
      required: [periodKey, value, level]
      properties:
        periodKey: { type: string }
        value:
          type: ["number", "null"]
          description: "0-100 metric for the period (attendance % or average grade); null when no data."
        level:
          type: string
          description: "Performance band for colour mapping."
          enum: [excellent, good, average, needs_improvement, weak, none]
    HeatmapCourse:
      type: object
      required:
        - courseId
        - courseName
        - overallGrade
        - performanceLevel
        - strength
        - classAverage
        - gradeDifference
        - comparisonStatus
        - overallAttendance
        - attendanceLevel
        - gradeCells
        - attendanceCells
      properties:
        courseId: { type: integer }
        courseName: { type: string }
        overallGrade: { type: ["number", "null"] }
        performanceLevel:
          type: string
          enum: [excellent, good, average, needs_improvement, weak, none]
        strength:
          type: string
          description: "Relative to the student's own overall average."
          enum: [strong, weak, normal, none]
        classAverage: { type: ["number", "null"] }
        gradeDifference: { type: ["number", "null"] }
        comparisonStatus: { type: string, enum: [Above, Below, Close, "No Data"] }
        overallAttendance: { type: ["number", "null"] }
        attendanceLevel:
          type: string
          enum: [excellent, good, average, needs_improvement, weak, none]
        gradeCells:
          type: array
          items: { $ref: "#/components/schemas/HeatmapCell" }
        attendanceCells:
          type: array
          items: { $ref: "#/components/schemas/HeatmapCell" }
    HeatmapRecommendation:
      type: object
      required: [id, type, courseName, title, message]
      properties:
        id: { type: string }
        type: { type: string, description: "weak_course | low_attendance | strong_course" }
        courseName: { type: ["string", "null"] }
        title: { type: string }
        message: { type: string }
    HeatmapReport:
      type: object
      required:
        - periods
        - courses
        - studentOverallAverage
        - recommendations
        - generatedAt
      properties:
        periods:
          type: array
          items: { $ref: "#/components/schemas/HeatmapPeriod" }
        courses:
          type: array
          items: { $ref: "#/components/schemas/HeatmapCourse" }
        studentOverallAverage: { type: ["number", "null"] }
        recommendations:
          type: array
          items: { $ref: "#/components/schemas/HeatmapRecommendation" }
        generatedAt: { type: string }
    HabitDailySummary:
      type: object
      required: [totalMinutes, sessionCount, averageMinutes, lastActivityAt]
      properties:
        totalMinutes: { type: integer, description: "Total valid study minutes today." }
        sessionCount: { type: integer }
        averageMinutes: { type: ["number", "null"] }
        lastActivityAt: { type: ["string", "null"], description: "ISO timestamp of the most recent study session." }
    HabitDayPattern:
      type: object
      required: [date, label, active, minutes, sessions]
      properties:
        date: { type: string, description: "YYYY-MM-DD" }
        label: { type: string, description: "Short weekday label, e.g. Mon" }
        active: { type: boolean }
        minutes: { type: integer }
        sessions: { type: integer }
    HabitWeeklyConsistency:
      type: object
      required:
        - activeDays
        - inactiveDays
        - totalDaysStudied
        - currentStreak
        - pattern
      properties:
        activeDays: { type: integer, description: "Days with >=1 valid session in the last 7 days." }
        inactiveDays: { type: integer }
        totalDaysStudied: { type: integer, description: "All-time distinct days with study activity." }
        currentStreak: { type: integer, description: "Consecutive active days ending today." }
        pattern:
          type: array
          items: { $ref: "#/components/schemas/HabitDayPattern" }
    HabitAverageDurations:
      type: object
      required: [daily, weekly, monthly]
      properties:
        daily: { type: ["number", "null"], description: "Avg session duration (min) today." }
        weekly: { type: ["number", "null"], description: "Avg session duration (min) over the last 7 days." }
        monthly: { type: ["number", "null"], description: "Avg session duration (min) over the last 30 days." }
    HabitProductiveHour:
      type: object
      required: [hour, totalMinutes, sessionCount]
      properties:
        hour: { type: integer, description: "Hour of day 0-23." }
        totalMinutes: { type: integer }
        sessionCount: { type: integer }
    HabitSubmissionStats:
      type: object
      required: [total, onTime, late, submissionRate]
      properties:
        total: { type: integer, description: "Assignments considered (due)." }
        onTime: { type: integer }
        late: { type: integer }
        submissionRate: { type: number, description: "Percentage submitted (on-time + late) of total." }
    HabitCourseSubmission:
      type: object
      required: [courseId, courseName, total, onTime, late, submissionRate]
      properties:
        courseId: { type: integer }
        courseName: { type: string }
        total: { type: integer }
        onTime: { type: integer }
        late: { type: integer }
        submissionRate: { type: number }
    HabitSubmissionHabits:
      type: object
      required: [overall, byCourse]
      properties:
        overall: { $ref: "#/components/schemas/HabitSubmissionStats" }
        byCourse:
          type: array
          items: { $ref: "#/components/schemas/HabitCourseSubmission" }
    HabitTrendPoint:
      type: object
      required: [label, minutes, sessions]
      properties:
        label: { type: string }
        minutes: { type: integer }
        sessions: { type: integer }
    HabitTrends:
      type: object
      required: [daily, weekly, monthly]
      properties:
        daily:
          type: array
          items: { $ref: "#/components/schemas/HabitTrendPoint" }
        weekly:
          type: array
          items: { $ref: "#/components/schemas/HabitTrendPoint" }
        monthly:
          type: array
          items: { $ref: "#/components/schemas/HabitTrendPoint" }
    HabitAlert:
      type: object
      required:
        - id
        - alertType
        - title
        - message
        - severity
        - status
        - userStory
        - createdAt
      properties:
        id: { type: integer }
        alertType:
          type: string
          enum: [inactivity, duration_drop, consistency_decline]
        title: { type: string }
        message: { type: string }
        severity: { type: string, enum: [low, medium, high] }
        status: { type: string, enum: [active, dismissed] }
        userStory: { type: string }
        createdAt: { type: string }
    HabitAlertStatusInput:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [active, dismissed] }
    HabitsReport:
      type: object
      required:
        - dailySummary
        - weeklyConsistency
        - averageDurations
        - productiveHours
        - peakHours
        - submissionHabits
        - trends
        - alerts
        - generatedAt
      properties:
        dailySummary: { $ref: "#/components/schemas/HabitDailySummary" }
        weeklyConsistency: { $ref: "#/components/schemas/HabitWeeklyConsistency" }
        averageDurations: { $ref: "#/components/schemas/HabitAverageDurations" }
        productiveHours:
          type: array
          items: { $ref: "#/components/schemas/HabitProductiveHour" }
        peakHours:
          type: array
          items: { type: integer }
          description: "Hours (0-23) with the highest total study minutes."
        submissionHabits: { $ref: "#/components/schemas/HabitSubmissionHabits" }
        trends: { $ref: "#/components/schemas/HabitTrends" }
        alerts:
          type: array
          items: { $ref: "#/components/schemas/HabitAlert" }
        generatedAt: { type: string }
